<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>HodlForWhat</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main id="app">
      <header class="app-header">
        <h1>HodlForWhat</h1>
        <div class="price-bar">
          <span class="price" id="price">BTC: —</span>
          <span class="updated" id="updated"></span>
          <button class="refresh" id="refresh" type="button">↻ Refresh</button>
        </div>
        <div class="toast" id="toast" role="status" aria-live="polite"></div>
      </header>

      <section class="targets-section">
        <div class="targets-header">
          <h2>Your targets</h2>
          <button class="add-new" id="add-new" type="button">+ Add new</button>
        </div>
        <div class="targets" id="targets"></div>
        <form class="target-form hidden" id="target-form" aria-label="Add or edit target">
          <input name="goal" aria-label="Goal (e.g. Down payment)" type="text" placeholder="Goal (e.g. Down payment)" maxlength="80" required />
          <input name="priceUsd" aria-label="Target BTC price in USD" type="number" min="0" step="1" placeholder="Target BTC price (USD)" required />
          <input name="amountBtc" aria-label="BTC to sell" type="number" min="0" step="0.0001" placeholder="BTC to sell" required />
          <input type="hidden" name="id" />
          <button type="submit">Save</button>
          <button type="button" id="form-cancel">Cancel</button>
        </form>
      </section>

      <footer class="app-footer">
        <small>No data leaves your device. We have no server.</small>
      </footer>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
